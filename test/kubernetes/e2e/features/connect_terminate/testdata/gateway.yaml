# Gateway configuration for CONNECT termination testing
# Using HTTP proxy (port 80) - HTTPS tunnel is established end-to-end through CONNECT
apiVersion: gateway.solo.io/v1
kind: Gateway
metadata:
  name: connect-terminate-gateway
spec:
  bindAddress: 0.0.0.0
  bindPort: 80
  httpGateway:
    options:
      dynamicForwardProxy:
        dnsCacheConfig:
          dnsLookupFamily: V4_ONLY
          hostTtl: 86400s
        sslConfig:
          sslFiles:
            rootCa: /etc/ssl/certs/ca-certificates.crt
      httpConnectionManagerSettings:
        upgrades:
        - connect:
            enabled: true
  proxyNames:
  - gateway-proxy
  ssl: false
  useProxyProto: false
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-proxy-connect-terminate
spec:
  ports:
  - name: https
    port: 8444
    protocol: TCP
    targetPort: 8444
  selector:
    gloo: gateway-proxy
  type: ClusterIP
