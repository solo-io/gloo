# Gateway configuration for CONNECT termination testing
# Matches manual validation that succeeded
apiVersion: gateway.solo.io/v1
kind: Gateway
metadata:
  name: connect-terminate-gateway
spec:
  bindAddress: 0.0.0.0
  bindPort: 9443
  httpGateway:
    options:
      dynamicForwardProxy:
        dnsCacheConfig:
          dnsLookupFamily: V4_ONLY
          hostTtl: 86400s
        sslConfig:
          sslFiles:
            rootCa: /etc/ssl/certs/ca-certificates.crt
      httpConnectionManagerSettings:
        upgrades:
        - connect:
            enabled: true
  proxyNames:
  - gateway-proxy-connect-terminate
  ssl: true
  useProxyProto: false
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-proxy-connect-terminate
spec:
  ports:
  - name: https
    port: 9443
    protocol: TCP
    targetPort: 9443
  selector:
    gloo: gateway-proxy
  type: ClusterIP
