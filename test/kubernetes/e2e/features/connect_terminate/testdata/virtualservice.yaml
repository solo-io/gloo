# VirtualService configuration for CONNECT termination testing
# Matches manual validation that succeeded
apiVersion: gateway.solo.io/v1
kind: VirtualService
metadata:
  name: connect-terminate-vs
  labels:
    gateway-type: connect-terminate
spec:
  displayName: connect-terminate-vs
  virtualHost:
    domains:
    - 'connect-terminate.example.com'
    routes:
    - matchers:
      - connectMatcher: {}
      options:
        upgrades:
        - connectTerminate:
            enabled: true
      routeAction:
        dynamicForwardProxy:
          autoHostRewriteHeader: "x-dfp-host"
          dnsCacheConfig:
            dnsLookupFamily: V4_ONLY
            hostTtl: 86400s
          sslConfig:
            sslFiles:
              rootCa: /etc/ssl/certs/ca-certificates.crt
