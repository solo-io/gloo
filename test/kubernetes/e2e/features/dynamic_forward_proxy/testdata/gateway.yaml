# Gateway configuration for CONNECT tunnel testing with Dynamic Forward Proxy
# Based on customer reproducer: 7973-https-connect-tunnel/fix/gateway-ssl-fixed-with-connect-terminate.yaml
apiVersion: gateway.solo.io/v1
kind: Gateway
metadata:
  name: dfp-connect-gateway
  namespace: gloo-system
spec:
  bindAddress: 0.0.0.0
  bindPort: 8080
  httpGateway:
    options:
      dynamicForwardProxy:
        dnsCacheConfig:
          dnsLookupFamily: V4_ONLY
          hostTtl: 86400s
        sslConfig:
          sslFiles:
            rootCa: /etc/ssl/certs/ca-certificates.crt
      httpConnectionManagerSettings:
        upgrades:
        - connect:
            enabled: true
  proxyNames:
  - gateway-proxy
  useProxyProto: false
