# Copies the auto-generated reference documentation from the gloo repo to the solo-io/docs repo.
#
# OSS docs (all supported release lines) are consolidated into a SINGLE pull request by the
# `consolidate-oss` job. Regenerating every line in one working tree means the shared,
# multi-version files (version conrefs, changelog, security scans) are only ever written once
# per run, so the separate per-line PRs can no longer conflict with each other.
#
# Enterprise (glooe) docs still arrive one release at a time via repository_dispatch and are
# handled by `copy-docs-enterprise`, because enterprise versions are not derivable from gloo tags.
name: push-docs

on:
  # An OSS release refreshes every supported line into the single consolidated PR.
  release:
    types: [created]
  # Nightly safety net so the PR stays current even if a release event is missed.
  schedule:
    - cron: '0 7 * * *'
  # Manual run. Leave `lines` as "all" to regenerate everything, or pass a comma-separated
  # subset of gloo refs (for example "v1.20.x,main") to limit the run.
  workflow_dispatch:
    inputs:
      lines:
        description: 'Comma-separated gloo refs to regenerate (e.g. "v1.20.x,main"), or "all".'
        required: false
        default: 'all'
  # Enterprise release notification from the solo-projects repo.
  repository_dispatch:
    types: [glooe-release-created]

# Serialize runs so concurrent releases never race the shared PR branch.
concurrency:
  group: push-docs
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # OSS: regenerate ALL supported lines and open one consolidated PR (Option B).
  # ---------------------------------------------------------------------------
  consolidate-oss:
    if: ${{ github.event_name != 'repository_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout docs repo
        uses: actions/checkout@v4
        with:
          repository: "solo-io/docs"
          token: ${{ secrets.DOCS_TOKEN }}
          path: docs
          fetch-depth: 0
          fetch-tags: "true"
      - name: Checkout gloo repo
        uses: actions/checkout@v4
        with:
          repository: "solo-io/gloo"
          token: ${{ secrets.DOCS_TOKEN }}
          path: gloo
          fetch-depth: 0
          fetch-tags: "true"
      - name: Fetch all supported gloo branches and tags
        run: |
          git -C gloo fetch --tags --force origin '+refs/heads/*:refs/remotes/origin/*'
      - name: Regenerate docs for all supported lines
        id: regen
        env:
          GITHUB_TOKEN: ${{ secrets.DOCS_TOKEN }}
          LINES_INPUT: ${{ inputs.lines }}
        run: |
          set -euo pipefail
          git config --global url."https://github_runner_solo:${GITHUB_TOKEN}@github.com".insteadOf "https://github.com"

          DOCS="$PWD/docs"
          GLOO="$PWD/gloo"

          # Fail loudly with a GitHub-annotated error, or just a warning, on version problems.
          die()  { echo "::error::$*"; exit 1; }
          warn() { echo "::warning::$*"; }

          # The minor that gloo `main` currently represents. Derive it from the newest tag
          # reachable from origin/main (e.g. v1.22.0-beta11 -> 1.22) rather than hardcoding it,
          # so it can never drift from the actual branch.
          main_tag="$(git -C "$GLOO" describe --tags --abbrev=0 origin/main 2>/dev/null || true)"
          [[ -n "$main_tag" ]] || die "Could not read any tag from origin/main; cannot determine the main-line minor. Were gloo tags fetched?"
          if [[ ! "$main_tag" =~ ^v?([0-9]+)\.([0-9]+)\. ]]; then
            die "Newest tag on origin/main ('$main_tag') is not a vMAJOR.MINOR.* version; cannot derive the main-line minor."
          fi
          MAIN_MINOR="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}"
          echo "main line resolves to ${MAIN_MINOR} (from tag ${main_tag})"

          # Supported lines, newest first. List ONLY the gloo refs - the minor and the docs
          # directory are derived from each ref in the loop, so there is one value to maintain.
          # ON_LTS_UPDATE - add the newest LTS branch (and drop the EOL one) when a minor is cut.
          LINES=(
            "main"
            "v1.21.x"
            "v1.20.x"
            "v1.19.x"
            "v1.18.x"
          )

          summary=""
          matched=0

          # Validate the manual filter up front so a typo fails fast with the valid set.
          if [[ -n "${LINES_INPUT:-}" && "${LINES_INPUT}" != "all" ]]; then
            valid=" ${LINES[*]} "
            IFS=',' read -ra requested <<< "$LINES_INPUT"
            for r in "${requested[@]}"; do
              r="${r//[[:space:]]/}"
              [[ -n "$r" ]] || continue
              [[ "$valid" == *" $r "* ]] || die "Requested line '$r' is not a known line. Valid refs: ${LINES[*]}"
            done
          fi

          for ref in "${LINES[@]}"; do
            # Optional filter from workflow_dispatch. Empty input or "all" means every line.
            if [[ -n "${LINES_INPUT:-}" && "${LINES_INPUT}" != "all" && ",${LINES_INPUT}," != *",${ref},"* ]]; then
              echo "Skipping ${ref} (not in requested lines '${LINES_INPUT}')"
              continue
            fi
            matched=$((matched + 1))

            # Derive the minor and docs directory from the ref. `main` uses MAIN_MINOR; every
            # other line must be a vMAJOR.MINOR.x LTS branch.
            if [[ "$ref" == "main" ]]; then
              minor="$MAIN_MINOR"
            elif [[ "$ref" =~ ^v([0-9]+\.[0-9]+)\.x$ ]]; then
              minor="${BASH_REMATCH[1]}"
            else
              die "Unrecognized line ref '${ref}'. Expected 'main' or a 'vMAJOR.MINOR.x' branch."
            fi
            directory="${minor}.x"

            echo "::group::Regenerating ${minor}.x from gloo ${ref}"
            git -C "$GLOO" rev-parse --verify --quiet "origin/${ref}^{commit}" >/dev/null \
              || die "gloo ref 'origin/${ref}' does not exist. Was it fetched, and is the branch name correct?"
            git -C "$GLOO" checkout --quiet --detach "origin/${ref}"

            # The latest release tag reachable from the line is the newest patch for that minor.
            new_version="$(git -C "$GLOO" describe --tags --abbrev=0 2>/dev/null || true)"
            new_version="${new_version#v}"

            if [[ -z "$new_version" ]]; then
              # main is always beta-tagged, so a missing tag there is suspect; a freshly cut LTS
              # branch may legitimately have none yet.
              if [[ "$ref" == "main" ]]; then
                warn "No tag reachable from origin/main; leaving the ${minor}.x conref unchanged."
              else
                echo "No release tag found for ${ref}; leaving conref unchanged."
              fi
              summary="${summary}- ${minor}.x → (no release tag; unchanged)\n"
            elif [[ "$new_version" != "${minor}."* ]]; then
              # The newest reachable tag belongs to a different minor than the branch claims -
              # usually a mis-cut branch or a stray tag. Don't silently bump the wrong field.
              die "Line '${ref}' resolved to tag '${new_version}', which is not a ${minor}.x patch. Refusing to bump the ${minor}.x conref with a mismatched version."
            else
              # Bump this minor's field in the OSS version conrefs (single-line files, one field per minor).
              minor_escaped="${minor//./\\.}"
              safe_new="${new_version//&/\\&}"
              before="$(cat "$DOCS"/assets/conrefs/versions/gloo_oss*.md 2>/dev/null || true)"
              find "$DOCS/assets/conrefs/versions" -type f -name 'gloo_oss*.md' -exec \
                sed -E -i "s/\}\}${minor_escaped}\.[0-9]+(-[a-zA-Z0-9]+)?\{\{/}}${safe_new}{{/g" {} \;
              after="$(cat "$DOCS"/assets/conrefs/versions/gloo_oss*.md 2>/dev/null || true)"
              if [[ "$before" != "$after" ]]; then
                echo "Bumped ${minor}.x -> ${new_version}"
              elif [[ "$after" == *"}}${new_version}{{"* ]]; then
                echo "Conref already at ${minor}.x -> ${new_version}; nothing to bump."
              else
                # No field for this minor exists yet - the conref needs a human to add one.
                warn "No ${minor}.x field found in assets/conrefs/versions/gloo_oss*.md; the conref may need a new entry for this minor. Leaving unchanged."
              fi
              summary="${summary}- ${minor}.x → ${new_version}\n"
            fi

            # Generate the reference docs for this line.
            ( cd "$GLOO" && make site-common -C docs )
            GEN="$GLOO/docs/content"

            # --- Per-line files: the filename/path carries the minor, so lines never collide. ---
            cp "$GEN/static/content/osa_included.md"      "$DOCS/assets/conrefs/pages/gateway/reference/osa_included_${minor}.md"
            cp "$GEN/static/content/osa_provided.md"      "$DOCS/assets/conrefs/pages/gateway/reference/osa_provided_${minor}.md"
            cp "$GEN/reference/values.txt"                "$DOCS/assets/conrefs/pages/reference/helm/values_${minor}.txt"
            cp "$GEN/static/content/glooe-values.docgen"  "$DOCS/assets/conrefs/pages/reference/helm/glooe-values_${minor}.md"

            mkdir -p "$DOCS/content/en/gateway/${directory}/reference/cli"
            for c in glooctl_check glooctl_debug glooctl_debug_yaml glooctl_install_gateway \
                     glooctl_install_gateway_enterprise glooctl_uninstall glooctl_upgrade; do
              cp "$GEN/reference/cli/${c}.md" "$DOCS/content/en/gateway/${directory}/reference/cli/${c}.md"
            done

            cp "$GEN/reference/api/github.com/solo-io/gloo/projects/gateway2/api/v1alpha1/direct_responses.md" \
               "$DOCS/assets/conrefs/pages/gateway/reference/direct_responses_${minor}.md"
            sed -i '1,2d' "$DOCS/assets/conrefs/pages/gateway/reference/direct_responses_${minor}.md"
            cp "$GEN/reference/api/github.com/solo-io/gloo/projects/gateway2/api/v1alpha1/gateway_parameters.md" \
               "$DOCS/assets/conrefs/pages/gateway/reference/gateway_parameters_${minor}.md"
            sed -i '1,2d' "$DOCS/assets/conrefs/pages/gateway/reference/gateway_parameters_${minor}.md"

            # --- Shared, multi-version files: written once, from the main line (the superset). ---
            if [[ "$minor" == "$MAIN_MINOR" ]]; then
              cp "$GEN/static/content/gloo-changelog.docgen"  "$DOCS/static/changelog/gloo-changelog.docgen"
              cp "$GEN/static/content/glooe-changelog.docgen" "$DOCS/static/changelog/glooe-changelog.docgen"
              cp "$GEN/reference/security-posture.yaml"       "$DOCS/static/content/examples/manual/security-posture.yaml"
              for s in gloo-security-scan gloo-security-scan-0 gloo-security-scan-1 gloo-security-scan-2 gloo-security-scan-3 gloo-security-scan-4 \
                       glooe-security-scan glooe-security-scan-0 glooe-security-scan-1 glooe-security-scan-2 glooe-security-scan-3 glooe-security-scan-4; do
                [ -f "$GEN/static/content/${s}.docgen" ] && cp "$GEN/static/content/${s}.docgen" "$DOCS/static/content/gg-security-updates/${s}.docgen" || true
              done
            fi
            echo "::endgroup::"
          done

          # Guard against a run that regenerated nothing (e.g. a filter that matched no lines).
          [[ "$matched" -gt 0 ]] || die "No lines were regenerated. Check the 'lines' input against: ${LINES[*]}"

          # Expose the per-line version summary for the PR body.
          {
            echo "versions<<DOCSGEN_EOF"
            printf '%b' "$summary"
            echo "DOCSGEN_EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Push and create the consolidated PR
        uses: peter-evans/create-pull-request@v7
        with:
          base: main
          path: docs
          branch: post-release-docs-copy
          delete-branch: true
          committer: github-runner-solo <github-runner-solo@github.com>
          commit-message: 'Copy auto-generated docs for all supported lines'
          title: '[Automated] Post-release docsgen (all supported lines)'
          body: |
            Copy auto-generated docs from the gloo repo for all supported release lines.

            Latest patch per line:
            ${{ steps.regen.outputs.versions }}
          team-reviewers: solo-io/solo-docs
          token: ${{ secrets.DOCS_TOKEN }}
      - name: Notify in slack of success
        if: success()
        uses: slackapi/slack-github-action@v2.0.0
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            {
              "channel": "C04DYBSJK0R",
              "text": "✅ *Success:* Consolidated reference-docs copy for all supported lines succeeded. <https://github.com/solo-io/docs/pulls|Review the PR>",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "✅ *Success:* Consolidated reference-docs copy for all supported lines succeeded. <https://github.com/solo-io/docs/pulls|Review the PR>"
                  }
                }
              ]
            }
      - name: Notify in slack of failure
        if: failure()
        uses: slackapi/slack-github-action@v2.0.0
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            {
              "channel": "C04DYBSJK0R",
              "text": "❌ *Failure*: Consolidated reference-docs copy failed. <https://github.com/solo-io/gloo/actions/runs/${{ github.run_id }}|Review the workflow failure>",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "❌ *Failure*: Consolidated reference-docs copy failed. <https://github.com/solo-io/gloo/actions/runs/${{ github.run_id }}|Review the workflow failure>"
                  }
                }
              ]
            }

  # ---------------------------------------------------------------------------
  # Enterprise (glooe): one release at a time, via repository_dispatch. Enterprise
  # versions arrive in the dispatch payload (which line, which tag) and cannot be
  # derived from gloo tags, so they are not batched like the OSS lines. The minor,
  # docs directory, and gloo ref are derived from the payload + git, not hardcoded.
  # ---------------------------------------------------------------------------
  copy-docs-enterprise:
    if: ${{ github.event_name == 'repository_dispatch' }}
    runs-on: ubuntu-latest
    steps:
    - name: Read dispatch payload
      id: lts-version
      run: |
        echo "lts=${{ github.event.client_payload.lts }}" >> $GITHUB_OUTPUT
        echo "tag=${{ github.event.client_payload.tag }}" >> $GITHUB_OUTPUT
    - name: Checkout docs repo
      uses: actions/checkout@v4
      with:
        repository: "solo-io/docs"
        token: ${{ secrets.DOCS_TOKEN }}
        path: docs
        fetch-depth: 0
        fetch-tags: "true"
    - name: Checkout gloo repo
      uses: actions/checkout@v4
      with:
        repository: "solo-io/gloo"
        token: ${{ secrets.DOCS_TOKEN }}
        path: gloo
        ref: main
        fetch-depth: 0
        fetch-tags: "true"
    - name: Fetch all gloo branches and tags
      run: |
        git -C gloo fetch --tags --force origin '+refs/heads/*:refs/remotes/origin/*'
    # Derive the minor/directory from the dispatch payload and check out the matching gloo ref.
    # main_minor is read from origin/main's newest tag, so nothing here is hardcoded per release.
    - name: Resolve version and check out gloo ref
      id: version-variables
      env:
        LTS: ${{ steps.lts-version.outputs.lts }}
        TAG: ${{ steps.lts-version.outputs.tag }}
      run: |
        set -euo pipefail
        die() { echo "::error::$*"; exit 1; }

        GLOO="$PWD/gloo"

        # The minor that gloo `main` currently represents (e.g. v1.22.0-beta11 -> 1.22).
        main_tag="$(git -C "$GLOO" describe --tags --abbrev=0 origin/main 2>/dev/null || true)"
        [[ -n "$main_tag" ]] || die "Could not read any tag from origin/main; cannot determine the main-line minor. Were gloo tags fetched?"
        [[ "$main_tag" =~ ^v?([0-9]+)\.([0-9]+)\. ]] || die "Newest tag on origin/main ('$main_tag') is not a vMAJOR.MINOR.* version."
        main_minor="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}"

        # The release minor comes from the LTS branch name; the main line carries no minor in its
        # name, so fall back to the release tag for it.
        if [[ "$LTS" =~ ^v([0-9]+\.[0-9]+)\.x$ ]]; then
          minor="${BASH_REMATCH[1]}"
        elif [[ "$LTS" == "main" ]]; then
          [[ "$TAG" =~ ^v?([0-9]+\.[0-9]+)\. ]] || die "lts='main' but tag '$TAG' is not a vMAJOR.MINOR.* version; cannot derive the minor."
          minor="${BASH_REMATCH[1]}"
        else
          die "Unrecognized lts '$LTS' from the dispatch payload. Expected 'main' or a 'vMAJOR.MINOR.x' branch."
        fi
        directory="${minor}.x"

        # The current-development minor lives on `main` until its vX.Y.x branch is cut, so only
        # prefer that branch once it actually exists.
        if [[ "$LTS" == "main" || "$minor" == "$main_minor" ]]; then
          if git -C "$GLOO" rev-parse --verify --quiet "origin/v${minor}.x^{commit}" >/dev/null; then
            ref="v${minor}.x"
          else
            ref="main"
          fi
        else
          ref="v${minor}.x"
        fi

        git -C "$GLOO" rev-parse --verify --quiet "origin/${ref}^{commit}" >/dev/null \
          || die "gloo ref 'origin/${ref}' does not exist. Was it fetched, and is the branch name correct?"
        git -C "$GLOO" checkout --quiet --detach "origin/${ref}"

        echo "Resolved lts='${LTS}' tag='${TAG}' -> minor=${minor}, directory=${directory}, gloo ref=${ref} (main is ${main_minor})"
        echo "minor=${minor}" >> "$GITHUB_OUTPUT"
        echo "directory=${directory}" >> "$GITHUB_OUTPUT"
    # Replace the previous enterprise patch version for this minor with the newly released tag.
    - name: Bump version conrefs
      run: |
        set -euo pipefail
        die()  { echo "::error::$*"; exit 1; }
        warn() { echo "::warning::$*"; }

        pushd docs || die "docs checkout is missing."

        MINOR_VERSION="${{ steps.version-variables.outputs.minor }}"
        NEW_VERSION="${{ steps.lts-version.outputs.tag }}"
        TARGET_DIR="assets/conrefs/versions"

        [[ -n "$NEW_VERSION" ]] || die "Dispatch payload carried no tag; nothing to bump for ${MINOR_VERSION}."

        # Normalize: strip a leading 'v' (v1.21.5 -> 1.21.5).
        TRIMMED_NEW_VERSION="${NEW_VERSION#v}"

        # The tag must belong to the minor we resolved, or we would bump the wrong field.
        [[ "$TRIMMED_NEW_VERSION" == "${MINOR_VERSION}."* ]] \
          || die "Release tag '${TRIMMED_NEW_VERSION}' is not a ${MINOR_VERSION}.x patch; refusing to bump the ${MINOR_VERSION} conref."

        # Escape periods in the minor (1.19 -> 1\.19) and & in the replacement string for sed.
        MINOR_VERSION_ESCAPED="${MINOR_VERSION//./\\.}"
        SAFE_NEW_VERSION="${TRIMMED_NEW_VERSION//&/\\&}"

        # Enterprise releases bump the gloo_patch* conrefs.
        FILE_PATTERN="gloo_patch*.md"

        before="$(cat "$TARGET_DIR"/$FILE_PATTERN 2>/dev/null || true)"
        find "$TARGET_DIR" -type f -name "$FILE_PATTERN" -exec \
          sed -E -i "s/\}\}${MINOR_VERSION_ESCAPED}\.[0-9]+(-[a-zA-Z0-9]+)?\{\{/}}${SAFE_NEW_VERSION}{{/g" {} \;
        after="$(cat "$TARGET_DIR"/$FILE_PATTERN 2>/dev/null || true)"

        if [[ "$before" != "$after" ]]; then
          echo "Replaced ${MINOR_VERSION} patch version with ${TRIMMED_NEW_VERSION} in $TARGET_DIR/$FILE_PATTERN"
        elif [[ "$after" == *"}}${TRIMMED_NEW_VERSION}{{"* ]]; then
          echo "Conref already at ${MINOR_VERSION} -> ${TRIMMED_NEW_VERSION}; nothing to bump."
        else
          warn "No ${MINOR_VERSION} field found in $TARGET_DIR/$FILE_PATTERN; the conref may need a new entry for this minor. Leaving unchanged."
        fi

        popd || exit 1
    - name: Generate docs
      env:
        GITHUB_TOKEN: ${{ secrets.DOCS_TOKEN }}
      run: |
        git config --global url."https://github_runner_solo:${GITHUB_TOKEN}@github.com".insteadOf "https://github.com"
        pushd gloo || exit 1
        make site-common -C docs
        popd || exit 1
    - name: Copy version changelogs
      run: |
        pushd docs || exit 1
        cp ../gloo/docs/content/static/content/gloo-changelog.docgen static/changelog/gloo-changelog.docgen
        cp ../gloo/docs/content/static/content/glooe-changelog.docgen static/changelog/glooe-changelog.docgen
        popd || exit 1
    - name: Copy security scans
      run: |
        pushd docs || exit 1
        # OSS
        [ -f ../gloo/docs/content/static/content/gloo-security-scan.docgen ] && cp ../gloo/docs/content/static/content/gloo-security-scan.docgen static/content/gg-security-updates/gloo-security-scan.docgen
        [ -f ../gloo/docs/content/static/content/gloo-security-scan-0.docgen ] && cp ../gloo/docs/content/static/content/gloo-security-scan-0.docgen static/content/gg-security-updates/gloo-security-scan-0.docgen
        [ -f ../gloo/docs/content/static/content/gloo-security-scan-1.docgen ] && cp ../gloo/docs/content/static/content/gloo-security-scan-1.docgen static/content/gg-security-updates/gloo-security-scan-1.docgen
        [ -f ../gloo/docs/content/static/content/gloo-security-scan-2.docgen ] && cp ../gloo/docs/content/static/content/gloo-security-scan-2.docgen static/content/gg-security-updates/gloo-security-scan-2.docgen
        [ -f ../gloo/docs/content/static/content/gloo-security-scan-3.docgen ] && cp ../gloo/docs/content/static/content/gloo-security-scan-3.docgen static/content/gg-security-updates/gloo-security-scan-3.docgen
        [ -f ../gloo/docs/content/static/content/gloo-security-scan-4.docgen ] && cp ../gloo/docs/content/static/content/gloo-security-scan-4.docgen static/content/gg-security-updates/gloo-security-scan-4.docgen
        # Enterprise
        [ -f ../gloo/docs/content/static/content/glooe-security-scan.docgen ] && cp ../gloo/docs/content/static/content/glooe-security-scan.docgen static/content/gg-security-updates/glooe-security-scan.docgen
        [ -f ../gloo/docs/content/static/content/glooe-security-scan-0.docgen ] && cp ../gloo/docs/content/static/content/glooe-security-scan-0.docgen static/content/gg-security-updates/glooe-security-scan-0.docgen
        [ -f ../gloo/docs/content/static/content/glooe-security-scan-1.docgen ] && cp ../gloo/docs/content/static/content/glooe-security-scan-1.docgen static/content/gg-security-updates/glooe-security-scan-1.docgen
        [ -f ../gloo/docs/content/static/content/glooe-security-scan-2.docgen ] && cp ../gloo/docs/content/static/content/glooe-security-scan-2.docgen static/content/gg-security-updates/glooe-security-scan-2.docgen
        [ -f ../gloo/docs/content/static/content/glooe-security-scan-3.docgen ] && cp ../gloo/docs/content/static/content/glooe-security-scan-3.docgen static/content/gg-security-updates/glooe-security-scan-3.docgen
        [ -f ../gloo/docs/content/static/content/glooe-security-scan-4.docgen ] && cp ../gloo/docs/content/static/content/glooe-security-scan-4.docgen static/content/gg-security-updates/glooe-security-scan-4.docgen
        popd || exit 1
    - name: Copy security posture
      run: |
        pushd docs || exit 1
        cp ../gloo/docs/content/reference/security-posture.yaml static/content/examples/manual/security-posture.yaml
        popd || exit 1
    - name: Copy OSA
      run: |
        pushd docs || exit 1
        cp ../gloo/docs/content/static/content/osa_included.md assets/gateway-docs/pages/reference/osa_included_${{ steps.version-variables.outputs.minor }}.md
        cp ../gloo/docs/content/static/content/osa_provided.md assets/gateway-docs/pages/reference/osa_provided_${{ steps.version-variables.outputs.minor }}.md
        popd || exit 1
    - name: Copy Helm
      run: |
        pushd docs || exit 1
        # OSS
        cp ../gloo/docs/content/reference/values.txt assets/gateway-docs/pages/reference/helm/values_${{ steps.version-variables.outputs.minor }}.txt
        # Enterprise
        cp ../gloo/docs/content/static/content/glooe-values.docgen assets/gateway-docs/pages/reference/helm/glooe-values_${{ steps.version-variables.outputs.minor }}.md
    - name: Copy CLI
      run: |
        pushd docs || exit 1
        mkdir -p content/en/gateway/${{ steps.version-variables.outputs.directory }}/reference/cli
        cp ../gloo/docs/content/reference/cli/glooctl_check.md content/en/gateway/${{ steps.version-variables.outputs.directory }}/reference/cli/glooctl_check.md
        cp ../gloo/docs/content/reference/cli/glooctl_debug.md content/en/gateway/${{ steps.version-variables.outputs.directory }}/reference/cli/glooctl_debug.md
        cp ../gloo/docs/content/reference/cli/glooctl_debug_yaml.md content/en/gateway/${{ steps.version-variables.outputs.directory }}/reference/cli/glooctl_debug_yaml.md
        cp ../gloo/docs/content/reference/cli/glooctl_install_gateway.md content/en/gateway/${{ steps.version-variables.outputs.directory }}/reference/cli/glooctl_install_gateway.md
        cp ../gloo/docs/content/reference/cli/glooctl_install_gateway_enterprise.md content/en/gateway/${{ steps.version-variables.outputs.directory }}/reference/cli/glooctl_install_gateway_enterprise.md
        cp ../gloo/docs/content/reference/cli/glooctl_uninstall.md content/en/gateway/${{ steps.version-variables.outputs.directory }}/reference/cli/glooctl_uninstall.md
        cp ../gloo/docs/content/reference/cli/glooctl_upgrade.md content/en/gateway/${{ steps.version-variables.outputs.directory }}/reference/cli/glooctl_upgrade.md
        popd || exit 1
    - name: Copy API
      run: |
        pushd docs || exit 1
        cp ../gloo/docs/content/reference/api/github.com/solo-io/gloo/projects/gateway2/api/v1alpha1/direct_responses.md assets/gateway-docs/pages/reference/direct_responses_${{ steps.version-variables.outputs.minor }}.md
        sed -i '1,2d' assets/gateway-docs/pages/reference/direct_responses_${{ steps.version-variables.outputs.minor }}.md
        cp ../gloo/docs/content/reference/api/github.com/solo-io/gloo/projects/gateway2/api/v1alpha1/gateway_parameters.md assets/gateway-docs/pages/reference/gateway_parameters_${{ steps.version-variables.outputs.minor }}.md
        sed -i '1,2d' assets/gateway-docs/pages/reference/gateway_parameters_${{ steps.version-variables.outputs.minor }}.md
        popd || exit 1
    - name: Push and create PR
      uses: peter-evans/create-pull-request@v7
      with:
        base: main
        body: 'Copy auto-generated enterprise docs from the gloo repo, post-release of Gloo Gateway Enterprise ${{ steps.version-variables.outputs.minor }}'
        branch: post-${{ steps.version-variables.outputs.minor }}-enterprise-docs-copy
        commit-message: 'Copy auto-generated enterprise docs from ${{ steps.version-variables.outputs.minor }}'
        committer: github-runner-solo <github-runner-solo@github.com>
        delete-branch: true
        path: docs
        team-reviewers: solo-io/solo-docs
        title: '[Automated] Post-release enterprise docsgen for ${{ steps.version-variables.outputs.minor }}'
        token: ${{ secrets.DOCS_TOKEN }}
    - name: Notify in slack of success
      if: success()
      uses: slackapi/slack-github-action@v2.0.0
      with:
        method: chat.postMessage
        token: ${{ secrets.SLACK_BOT_TOKEN }}
        payload: |
          {
            "channel": "C04DYBSJK0R",
            "text": "✅ *Success:* Automated copy of enterprise reference docs for ${{ steps.version-variables.outputs.minor }} was successful. <https://github.com/solo-io/docs/pulls|Review the PR>",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "✅ *Success:* Automated copy of enterprise reference docs for ${{ steps.version-variables.outputs.minor }} was successful. <https://github.com/solo-io/docs/pulls|Review the PR>"
                }
              }
            ]
          }
    - name: Notify in slack of failure
      if: failure()
      uses: slackapi/slack-github-action@v2.0.0
      with:
        method: chat.postMessage
        token: ${{ secrets.SLACK_BOT_TOKEN }}
        payload: |
          {
            "channel": "C04DYBSJK0R",
            "text": "❌ *Failure*: Automated copy of enterprise reference docs in the gloo repo failed. <https://github.com/solo-io/gloo/actions/runs/${{ github.run_id }}|Review the workflow failure>",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "❌ *Failure*: Automated copy of enterprise reference docs in the gloo repo failed. <https://github.com/solo-io/gloo/actions/runs/${{ github.run_id }}|Review the workflow failure>"
                }
              }
            ]
          }
