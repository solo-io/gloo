changelog:
  - type: FIX
    issueLink: https://github.com/solo-io/solo-projects/issues/8802
    resolvesIssue: false
    description: >-
      Fix excessive control plane memory usage in the Kubernetes Gateway API translation when many
      routes reference the same RouteOption. Translation no longer deep-copies the attached
      RouteOption's options (including potentially large transformation templates) for every route
      rule on every translation cycle: each unique RouteOption is deep-copied exactly once per
      translation pass and that interned copy's sub-messages are shared by every route referencing
      it, so memory scales with the number of unique RouteOptions instead of the number of
      translated routes. The informer cache itself is never reachable from translation output. The
      merged options remain a distinct per-route message, so translation plugins can still set
      route-level fields safely; they must not mutate nested option messages in place.
  - type: FIX
    issueLink: https://github.com/solo-io/solo-projects/issues/8802
    resolvesIssue: false
    description: >-
      The transformation plugin no longer writes the resolved escapeCharacters inheritance
      (template -> staged -> Settings) back into the input transformation template. The input
      template can be shared across every route referencing the same RouteOption, so the
      write-back could leak the resolved value across routes and mask later changes to the
      Settings-level default.
  - type: FIX
    issueLink: https://github.com/solo-io/solo-projects/issues/8802
    resolvesIssue: false
    description: >-
      The Kubernetes Gateway API header modifier filter no longer writes into an existing
      HeaderManipulation message on the route's options in place; it copies the message before
      applying the filter. The existing message can be shared with other routes referencing the
      same RouteOption when parent filters are re-applied to delegated child routes.
