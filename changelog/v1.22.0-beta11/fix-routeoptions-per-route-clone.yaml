changelog:
  - type: FIX
    issueLink: https://github.com/solo-io/solo-projects/issues/8802
    resolvesIssue: false
    description: >-
      Reduce translation memory usage for HTTPRoutes with attached RouteOptions.
      Previously, GetRouteOptionForRouteRule deep-cloned the entire RouteOptions
      tree (including large transformation templates) for every route rule on
      every translation cycle, even when a single RouteOption was attached. The
      merge now uses copy-on-write: a single attached RouteOption is shared by
      reference and only cloned when a second option must actually be merged in.
      This roughly halves the per-route RouteOptions clone allocations on the
      Kubernetes Gateway API translation path for transformation-heavy configs.
