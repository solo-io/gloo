options:
  env:
    - "GO111MODULE=on"
    - "GOTOOLCHAIN=auto"

steps:
- name: gcr.io/cloud-builders/gsutil
  entrypoint: 'bash'
  args: ['-c', 'mkdir -p /go/pkg && cd /go/pkg && gsutil cat gs://$PROJECT_ID-cache/gloo/gloo-mod.tar.gz | tar -xzf -']
  env:
  volumes: &vol
  - name: 'gopath'
    path: '/go/pkg'
  id: 'untar-mod-cache'

# NOTE: No need to bump 1.26 when you bump the go version in go.mod.
# The GOTOOLCHAIN=auto env var will automatically use the go version specified in go.mod.
- name: 'golang:1.26'
  entrypoint: 'bash'
  args:
    - '-c'
    - 'go mod download && go mod tidy && cd /go/pkg && tar -zvcf gloo-mod.tar.gz mod'
  volumes: *vol
  id: 'download-tidy-cache'

- name: gcr.io/cloud-builders/gsutil
  args: ['cp', '/go/pkg/gloo-mod.tar.gz', 'gs://$PROJECT_ID-cache/gloo/gloo-mod.tar.gz']
  volumes: *vol
  id: 'upload-cache'
